<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de tarefas</title>
    <link rel="stylesheet" href="./assets/css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300&display=swap" rel="stylesheet">

</head>
<body>
    
    <section class="conteiner"> 
    <h1>Calculadora</h1>

    <table class="calculadora">
        <tr> 
            <td colspan="4"><input class="display" type="text" name="" id="numeros"></td>
        </tr>

        <tr>
            <td>
                <input class="btn btn-clear" type="button" value="C">
                <input class="btn btn-num" type="button" value="(">
                <input class="btn btn-num" type="button" value=")">
                <input class="btn btn-num" type="button" value="/">
            </td>
        </tr>
        
        <tr>
            <td>
                <input class="btn btn-num" type="button" value="7">
                <input class="btn btn-num" type="button" value="8">
                <input class="btn btn-num" type="button" value="9">
                <input class="btn btn-num" type="button" value="*">
            </td>
        </tr>

        <tr>
           <td>
            <input class="btn btn-num" type="button" value="4">
            <input class="btn btn-num" type="button" value="5">
            <input class="btn btn-num" type="button" value="6">
            <input class="btn btn-num" type="button" value="+">
           </td>
        </tr>

        <tr>
           <td>
            <input class="btn btn-num" type="button" value="1">
            <input class="btn btn-num" type="button" value="2">
            <input class="btn btn-num" type="button" value="3">
            <input class="btn btn-num" type="button" value="-">
           </td>
        </tr>

        <tr>
           <td>
            <input class="btn btn-num" type="button" value=".">
            <input class="btn btn-num" type="button" value="0">
            <input class="btn btn-del" type="button" value="«">
            <input class="btn btn-eq" type="button" value="=">
           </td>
        </tr>

    </table>

    </section>

    <script src="./assets/js/main.js"></script>
</body>
</html>
